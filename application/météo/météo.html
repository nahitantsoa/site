<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Météo – Nahitantsoa</title>
  
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
        rel="stylesheet" 
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" 
        crossorigin="anonymous">
  
  <!-- Notre style personnalisé -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
  <div class="card card-meteo text-center">
    <div class="card-header">
      Météo Actuelle
    </div>
    
    <div class="card-body p-5">
      <h2 class="ville mb-4" id="ville">Antananarivo</h2>
      
      <div class="temperature mb-3" id="temperature_label">-- °C</div>
      
      <div class="input-group mb-4 mx-auto" style="max-width: 320px;">
        <input type="text" id="inputVille" class="form-control" 
               placeholder="Entrez une ville..." aria-label="Ville">
        <button class="btn" type="button" id="btnRechercher">Voir</button>
      </div>
      
      <div id="messageErreur" class="alert alert-danger d-none" role="alert">
        Une erreur est survenue. Vérifiez le nom de la ville ou réessayez plus tard.
      </div>
    </div>
  </div>
</div>

<!-- Nos scripts (dans l'ordre) -->
<script src="script.js"></script>

<!-- Bootstrap JS (optionnel) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" 
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" 
        crossorigin="anonymous"></script>
</body>
</html>
